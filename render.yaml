services:
  - type: web
    name: task-management-app
    runtime: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader --prefer-dist && npm install && npm run build
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Task Management
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: task-management-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: task-management-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: task-management-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: task-management-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: task-management-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: task-management-db
    plan: free
    databaseName: task_management
    user: task_management_user
